<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Заголовок */
    .title {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title-top {
      font-family: monospace;
      font-size: clamp(11px, 1.3vw, 13px);
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .title-main {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .title-sub {
      font-family: monospace;
      font-size: clamp(12px, 1.5vw, 14px);
      color: #555;
      font-weight: 400;
    }

    /* Видео */
    .video-wrap {
      position: relative;
      height: clamp(280px, 52vh, 460px);
      aspect-ratio: 9 / 16;
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.85),
        0 0 40px rgba(255, 255, 255, 0.12);
      animation: breathe 3.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,255,255,0.85), 0 0 30px rgba(255,255,255,0.1); }
      50%       { box-shadow: 0 0 0 4px rgba(255,255,255,1),   0 0 55px rgba(255,255,255,0.25); }
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Сканирующая линия */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      box-shadow: 0 0 12px 4px rgba(255,255,255,0.3);
      animation: scan 2.4s ease-in-out infinite;
      top: 0;
    }

    @keyframes scan {
      0%   { top: 0%; opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Уголки как у сканера */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(255,255,255,0.8);
      border-style: solid;
    }
    .corner-tl { top: 10px; left: 10px;  border-width: 2px 0 0 2px; }
    .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 10px; left: 10px;  border-width: 0 0 2px 2px; }
    .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

    /* Прогресс */
    .progress-section {
      width: clamp(220px, 38vw, 380px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .status-text {
      font-family: monospace;
      font-size: clamp(12px, 1.4vw, 14px);
      color: #666;
    }

    .percent {
      font-size: clamp(36px, 5.5vw, 56px);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
    }

    .bar-track {
      width: 100%;
      height: 5px;
      background: #1e1e1e;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #fff;
      width: 0%;
      transition: width 0.25s ease;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    /* Кнопка */
    .verdict {
      display: none;
      animation: fadeIn 0.6s ease;
    }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      border: 2px solid rgba(255, 255, 255, 0.85);
      color: #fff;
      text-decoration: none;
      font-size: clamp(14px, 1.8vw, 16px);
      font-weight: 700;
      font-family: 'Arial Black', Arial, sans-serif;
      letter-spacing: 0.5px;
      border-radius: 50px;
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .btn:hover {
      background: #fff;
      color: #0a0a0a;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .code-hint {
      position: fixed;
      bottom: 24px;
      font-family: monospace;
      font-size: 13px;
      color: #2a2a2a;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">
      <div class="title-top">system check v2.1</div>
      <div class="title-main">Проверяем, что вы не робот</div>
      <div class="title-sub">Подождите...</div>
    </div>

    <div class="video-wrap">
      <video src="cat.mp4" autoplay loop muted playsinline></video>
      <div class="scan-line"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>

    <div class="progress-section" id="progress-section">
      <div class="top-row">
        <div class="status-text" id="status">Инициализация сканера...</div>
        <div class="percent" id="percent">0%</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
    </div>

    <div class="verdict" id="verdict">
      <a class="btn" href="https://mirzohiddevloper.github.io/Resume/">Зайти на сайт</a>
    </div>

  </div>

  <span class="code-hint">robot_check_v2.1</span>

  <script>
    const messages = [
      "Инициализация сканера...",
      "Поиск серийного номера...",
      "Считывание чипа...",
      "Анализ моторики...",
      "Проверка масляных следов...",
      "Сканирование процессора...",
      "Верификация батареи...",
      "Финальная проверка...",
    ];

    const bar = document.getElementById('bar');
    const percentEl = document.getElementById('percent');
    const statusEl = document.getElementById('status');
    const progressSection = document.getElementById('progress-section');
    const verdict = document.getElementById('verdict');

    let progress = 0;

    function step() {
      if (progress >= 100) {
        percentEl.textContent = '100%';
        bar.style.width = '100%';
        statusEl.textContent = 'Готово.';

        setTimeout(() => {
          progressSection.style.display = 'none';
          verdict.style.display = 'block';
        }, 600);

        return;
      }

      const increment = Math.random() * 2.5 + 0.5;
      progress = Math.min(100, progress + increment);

      percentEl.textContent = Math.floor(progress) + '%';
      bar.style.width = progress + '%';

      const msgIndex = Math.min(
        Math.floor((progress / 100) * messages.length),
        messages.length - 1
      );
      statusEl.textContent = messages[msgIndex];

      setTimeout(step, 100 + Math.random() * 150);
    }

    setTimeout(step, 700);
  </script>

</body>
</html>
